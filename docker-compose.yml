services:
  postgres:
    image: postgres:16-alpine
    container_name: wagr-postgres
    environment:
      POSTGRES_USER: wagr
      POSTGRES_PASSWORD: wagr_dev_password
      POSTGRES_DB: wagr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/internal/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wagr -d wagr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
